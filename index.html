<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到我的小站</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 烟花画布 -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- 几何装饰层 -->
    <div class="geo-decor">
        <div class="geo-triangle geo-t1"></div>
        <div class="geo-triangle geo-t2"></div>
        <div class="geo-diamond geo-d1"></div>
        <div class="geo-diamond geo-d2"></div>
        <div class="geo-wave geo-w1"></div>
        <div class="geo-wave geo-w2"></div>
        <div class="geo-circle geo-c1"></div>
        <div class="geo-circle geo-c2"></div>
        <div class="geo-line geo-l1"></div>
        <div class="geo-line geo-l2"></div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="#" class="nav-logo">
                <span class="logo-shape"></span>
                <span class="logo-text">Lucky☆Star</span>
            </a>
            <ul class="nav-links">
                <li><a href="#home" class="active">首页</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#works">作品</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 欢迎区域 -->
    <section class="hero" id="home">
        <div class="hero-inner">
            <!-- 头像区域 -->
            <div class="avatar-section">
                <div class="avatar-frame">
                    <div class="avatar-ring ring-outer"></div>
                    <div class="avatar-ring ring-inner"></div>
                    <img src="images/32961D77DF9657908B5F175107DAA351.jpg" alt="头像" class="avatar-img" id="avatar-img">
                    <div class="avatar-accent"></div>
                </div>
                <div class="avatar-decoration">
                    <span class="deco-star">★</span>
                    <span class="deco-diamond">◆</span>
                    <span class="deco-triangle">▲</span>
                </div>
            </div>

            <!-- 文字区域 -->
            <div class="text-section">
                <div class="greeting">
                    <span class="greeting-line"></span>
                    <span class="greeting-text">こんにちは</span>
                    <span class="greeting-line"></span>
                </div>
                <h1 class="nickname">
                    <span class="nick-char">[</span>
                    <span class="nick-main">yuyuyyyyyuuuuuu</span>
                    <span class="nick-char">]</span>
                </h1>
                <p class="subtitle">
                    <span class="sub-deco">~</span>
                    欢迎来到我的幸运星小站
                    <span class="sub-deco">~</span>
                </p>
                <div class="tags">
                    <span class="tag">C++</span>
                    <span class="tag">Python</span>
                    <span class="tag">前端学习中</span>
                </div>
                <a href="#about" class="scroll-hint">
                    <span class="scroll-line"></span>
                    <span class="scroll-text">向下探索</span>
                </a>
            </div>
        </div>
    </section>

    <!-- 关于区域 -->
    <section class="about" id="about">
        <div class="about-inner">
            <h2 class="section-title">
                <span class="title-deco">◆</span>
                关于我
                <span class="title-deco">◆</span>
            </h2>
            <p class="about-text">这里以后可以写详细介绍...</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
